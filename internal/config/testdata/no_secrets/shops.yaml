shops:
  - name: "Galaxus"
    source_type: "json"
    method: "POST"
    cleaner: "galaxus"
    categories:
      - category: "smartphone"
        url: "https://www.galaxus.ch/api/graphql/product-type-filter-products"
        body_template: "templates/galaxus_smartphone.json"
        max_pages: 5
        pagination:
          type: "offset"
          param: "offset"
          per_page: 24
        fields:
          products: "data.productType.filterProducts.products.results"
          title: "product.name"
          price: "offer.price.amountInclusive"
          url: "product.productId"
          image: "product.imageUrl"
        currency: "CHF"

  - name: "Amazon"
    source_type: "html"
    cleaner: "amazon"
    base_url: "https://www.amazon.de"
    categories:
      - category: "smartphone"
        url: "https://www.amazon.de/s?k=smartphone&page={page}"
        max_pages: 3
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        selectors:
          product_card: "div[data-component-type='s-search-result']"
          title: "h2 a span"
          price: "span.a-price span.a-offscreen"
          url: "h2 a[href]"
          image: "img.s-image[src]"
        currency: "EUR"
